name: PR Tests

on:
  pull_request:
    branches: [main]

concurrency:
  group: pr-tests-${{ github.ref }}
  cancel-in-progress: true

env:
  FOUNDRY_PROFILE: pr

jobs:
  build:
    name: Build & Format
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 1

      - name: Sync submodules
        run: git submodule update --init --recursive

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
        with:
          version: stable

      - name: Check formatting
        run: forge fmt --check

      - name: Build
        run: forge build --sizes

  test-unit:
    name: Unit & Fuzz Tests
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 1

      - name: Sync submodules
        run: git submodule update --init --recursive

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
        with:
          version: stable

      - name: Run unit & fuzz tests
        run: forge test -vvv --no-match-path "test/fork/*"

  test-fork:
    name: Fork Tests
    runs-on: ubuntu-latest
    needs: build
    env:
      BASE_RPC_URL: ${{ secrets.BASE_RPC_URL }}
      BASE_SEPOLIA_RPC_URL: ${{ secrets.BASE_SEPOLIA_RPC_URL }}
      ARBITRUM_RPC_URL: ${{ secrets.ARBITRUM_RPC_URL }}
      ARBITRUM_SEPOLIA_RPC_URL: ${{ secrets.ARBITRUM_SEPOLIA_RPC_URL }}
      UNICHAIN_RPC_URL: ${{ secrets.UNICHAIN_RPC_URL }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 1

      - name: Sync submodules
        run: git submodule update --init --recursive

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
        with:
          version: stable

      - name: Run fork tests
        run: forge test -vvv --match-path "test/fork/*"
